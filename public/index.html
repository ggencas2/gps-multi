<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Trackers</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:      #f7f6f3;
      --surface: #ffffff;
      --border:  #e5e2dc;
      --text:    #1a1916;
      --muted:   #9b9690;
      --mono:    'DM Mono', monospace;
      --sans:    'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
      align-self: flex-start;
      max-width: 900px;
      width: 100%;
    }

    /* Map: exactly 50% of viewport height */
    #map {
      width: 100%;
      max-width: 900px;
      height: 50vh;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    #status {
      max-width: 900px;
      width: 100%;
      margin-top: 1rem;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #refreshBtn {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #refreshBtn:hover    { background: var(--border); }
    #refreshBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Numbered circle markers */
    .circle-marker {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      border: 2.5px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.15);
      transition: transform 0.2s;
      cursor: pointer;
    }

    .circle-marker:hover { transform: scale(1.15); }

    .color-1 { background: #e05c5c; }
    .color-2 { background: #e08c3a; }
    .color-3 { background: #4a9e6b; }
    .color-4 { background: #4a7fc1; }
    .color-5 { background: #8b5fc1; }
    .color-6 { background: #c15f8b; }

    .leaflet-popup-content-wrapper {
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      font-family: var(--sans);
      font-size: 13px;
    }

    .leaflet-popup-content { margin: 10px 14px; line-height: 1.6; }

    .popup-title {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .popup-detail { font-size: 12px; color: #666; }

    @media (max-width: 600px) {
      body { padding: 1rem 0.75rem; }
      #map { height: 50vh; border-radius: 8px; }
    }
  </style>
</head>
<body>

  <h1>Live Tracker — 6 Demo Devices</h1>
  <div id="map"></div>
  <div id="status">
    <span id="lastUpdate">Loading...</span>
    <button id="refreshBtn">↺ Refresh</button>
  </div>

  <script>
    // ── 6 demo trackers ──
    const TRACKERS = [
      { imei: '894758493847414', number: 1 },
      { imei: '894758493847392', number: 2 },
      { imei: '894758493847434', number: 3 },
      { imei: '894758493847406', number: 4 },
      { imei: '894758493847427', number: 5 },
      { imei: '894758493847428', number: 6 },
    ]

    // ── Map setup — centered on Vietnam where demo devices are ──
    const map = L.map('map', { center: [16, 106], zoom: 6 })

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>'
    }).addTo(map)

    // Store markers by IMEI for efficient updates
    const markers = new Map()

    function createIcon(number) {
      return L.divIcon({
        className: '',
        html: `<div class="circle-marker color-${number}">${number}</div>`,
        iconSize:    [32, 32],
        iconAnchor:  [16, 16],
        popupAnchor: [0, -18]
      })
    }

    function placeMarker(tracker, lat, lng, popupContent) {
      const imei = tracker.imei
      if (markers.has(imei)) {
        markers.get(imei).setLatLng([lat, lng])
      } else {
        const marker = L.marker([lat, lng], { icon: createIcon(tracker.number) }).addTo(map)
        marker.bindPopup(popupContent)
        markers.set(imei, marker)
      }
    }

    // ── Fetch all 6 trackers in parallel ──
    async function fetchAllTrackers() {
      document.getElementById('refreshBtn').disabled = true
      document.getElementById('lastUpdate').textContent = 'Updating...'

      // Use relative URL — works on both Railway and localhost
      const requests = TRACKERS.map(tracker =>
        fetch(`/api/device?imei=${tracker.imei}`)
          .then(res => res.json())
          .then(json => ({ tracker, json }))
          .catch(err => ({ tracker, error: err.message }))
      )

      const results = await Promise.all(requests)
      const validCoords = []

      results.forEach(({ tracker, json, error }) => {
        if (error || !json.success) {
          console.warn(`Tracker ${tracker.number}: ${error || 'API error'}`)
          return
        }

        const status = json.data.deviceStatus
        const brief  = json.data.deviceBrief
        const lat    = parseFloat(status.lat)
        const lng    = parseFloat(status.lng)

        const popupContent = `
          <div class="popup-title">Tracker ${tracker.number} — ${brief?.name || tracker.imei}</div>
          <div class="popup-detail">
            ${status.address || 'Unknown location'}<br>
            Speed: ${status.speed} km/h<br>
            IMEI: ${tracker.imei}
          </div>
        `

        placeMarker(tracker, lat, lng, popupContent)
        validCoords.push([lat, lng])
      })

      // Auto-fit map to show all markers
      if (validCoords.length > 0) {
        map.fitBounds(validCoords, { padding: [40, 40] })
      }

      document.getElementById('lastUpdate').textContent =
        `Last updated: ${new Date().toLocaleTimeString()}`
      document.getElementById('refreshBtn').disabled = false
    }

    document.getElementById('refreshBtn').addEventListener('click', fetchAllTrackers)
    fetchAllTrackers()
    setInterval(fetchAllTrackers, 30000)
  </script>
</body>
</html>
